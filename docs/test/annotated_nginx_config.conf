############################################################
# HTTP CONTEXT
# Top-level configuration for HTTP servers
############################################################

http {

    ########################################################
    # MIME TYPES
    ########################################################

    # Maps file extensions to Content-Type header
    include /etc/nginx/mime.types;

    # Default if extension not found
    default_type application/octet-stream;

    ########################################################
    # PERFORMANCE / CONNECTION SETTINGS
    ########################################################

    sendfile on;                # zero-copy file sending
    keepalive_timeout 65;       # persistent connections timeout
    client_max_body_size 10M;   # limit upload size

    ########################################################
    # SERVER CONTEXT (Virtual Host)
    ########################################################

    ########################################################
    # Default Server
    # a file config can have several server directive.
    # Order matters only for servers listening on the same IP:port. if a request comes with host: unknown.com, and no server_name matches
    # 👉 NGINX picks the first declared server block for that listen pair. That becomes the default server implicitly.
    # Except if default_server is indicated
    server {
        listen 80 default_server; # default_server is indicated making this server the default one, no matter which order it is in the list of server
        server_name _;
        root /var/www/default;
    }

    server {
        # The server listens on port 8080.
        #
        # Example URL:
        # http://test_nginx.test:8080/
        listen 8080;

        # This block only responds if the request Host header
        # matches "test_nginx.test".
        #
        # Example:
        # curl http://test_nginx.test:8080/
        #
        # Would match.
        #
        # But:
        # curl http://localhost:8080/
        #
        # Would NOT match this server block.
        server_name test_nginx.test;


        # Root directory for static files
        # Default root directory on disk.
        # NGINX builds file path as:
        #   root + full request URI
        #
        # -----------------------------------------
        # Example 1:
        # URL:
        # http://test_nginx.test:8080/index.html
        #
        # Request URI:
        # /index.html
        #
        # File looked up:
        # /srv/test/static-demo/index.html
        #
        # -----------------------------------------
        # Example 2:
        # URL:
        # http://test_nginx.test:8080/css/style.css
        #
        # File looked up:
        # /srv/test/static-demo/css/style.css
        root /srv/test/static-demo;

        # Default index files
        index index.html index.htm;

        ####################################################
        # ERROR PAGES
        ####################################################

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /404.html {
            internal;   # cannot be accessed directly menaing that users cannot directly request /404.html.
                        # it can only be served via error_page
        }

        ####################################################
        # LOCATION MATCHING EXAMPLES
        ####################################################

        # 1️⃣ EXACT MATCH (highest priority)
        location = /test {
            return 200 "Exact match\n";
        }

        # 2️⃣ PREFIX MATCH
        location /test {
            return 200 "Prefix match\n";
        }

        # 3️⃣ PREFIX THAT STOPS REGEX CHECK
        # Matches any URL that STARTS with /images/
        #
        # Examples that match:
        #   /images/pic.jpg
        #   /images/icons/logo.png
        #
        # Examples that DO NOT match:
        #   /image/pic.jpg
        #   /img/pic.jpg
        location ^~ /images/ {
            # This overrides the server-level root.
            #
            # IMPORTANT:
            # nginx builds the file path as:
            #   root + full request URI
            #
            # -----------------------------------------
            # Example 3:
            # URL:
            # http://test_nginx.test:8080/images/pic.jpg
            #
            # Request URI:
            # /images/pic.jpg
            #
            # File looked up:
            # /data/images/pic.jpg
            #
            # -----------------------------------------
            # Example 4:
            # URL:
            # http://test_nginx.test:8080/images/icons/logo.png
            #
            # File looked up:
            # /data/images/icons/logo.png
            root /data;
        }

        # 4️⃣ REGEX (case-sensitive)
        location ~ ^/user[0-9]+$ {
            return 200 "Regex match\n";
        }

        # 5️⃣ REGEX (case-insensitive)
        location ~* \.(jpg|jpeg|png)$ {
            root /var/www/images;
        }

        ####################################################
        # QUERY STRING VARIABLES
        ####################################################

        # Example: /hello?name=42
        location /hello {
            set $name $arg_name;
            return 200 "Hello $name\n";
        }

        ####################################################
        # STATIC FILE HANDLING
        ####################################################

        location / {
            # Order:
            # 1. Try exact file
            # 2. Try directory
            # 3. Return 404
            try_files $uri $uri/ =404;
        }

        ####################################################
        # AUTO INDEX (Directory Listing)
        ####################################################

        location /files/ {
            autoindex on;
        }

        ####################################################
        # METHOD RESTRICTION
        ####################################################

        location /upload {
            limit_except GET POST {
                deny all;
            }
            # Only GET and POST allowed.
            # Others → 403 Forbidden.
        }

        ####################################################
        # REDIRECTION
        ####################################################

        location = /old_page {
            return 301 /new_page;
            # Client receives:
            # HTTP/1.1 301 Moved Permanently
            # Location: /new_page
        }

        ####################################################
        # CGI (concept example)
        ####################################################

        location ~ \.php$ {
            # In real nginx:
            # fastcgi_pass 127.0.0.1:9000;
            # include fastcgi_params;

            # In Webserv:
            # you will fork + execve CGI binary
        }
    }
    
    ########################################################
    # SERVER WITH SPECIFIC INTERFACE
    ########################################################
    server {

        listen 127.0.0.1:8080;
        # Interface:Port pair
        # IP: 127.0.0.1  (localhost only)
        # Port: 8080
        #
        # This means:
        # - Only accessible from THIS machine
        # - Not accessible from other computers
        #
        # Valid URL:
        # http://127.0.0.1:8080/

        server_name test_nginx.test;
        # This is NOT the IP.
        # This is matched against the HTTP Host header.
        #
        # If your system resolves:
        # test_nginx.test → 127.0.0.1
        #
        # Then this also works:
        # http://test_nginx.test:8080/

        root /srv/test/static-demo;
        # Default filesystem root
        #
        # Example:
        # http://127.0.0.1:8080/index.html
        # → /srv/test/static-demo/index.html

        location ^~ /images/ {

            root /data;
            # Example:
            # http://127.0.0.1:8080/images/pic.jpg
            # → /data/images/pic.jpg
        }
    }

}
